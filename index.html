<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro CRM - Fully Editable</title>
    <style>
        /* --- MODERN UI & THEME ENGINE --- */
        :root {
            --bg-base: #f1f5f9; --bg-panel: #ffffff; --bg-glass: rgba(255, 255, 255, 0.85);
            --border: #e2e8f0; --border-hover: #cbd5e1;
            --text-main: #0f172a; --text-muted: #64748b;
            --primary: #2563eb; --primary-hover: #1d4ed8; --primary-light: #dbeafe;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-base: #0f172a; --bg-panel: #1e293b; --bg-glass: rgba(30, 41, 59, 0.85);
            --border: #334155; --border-hover: #475569;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #3b82f6; --primary-hover: #2563eb; --primary-light: #1e3a8a;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; background-color: var(--bg-base); color: var(--text-main); -webkit-font-smoothing: antialiased; transition: background-color 0.3s; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }
        #app-container { display: flex; width: 100%; height: 100%; position: relative; }

        /* Navigation */
        #nav-sidebar { width: 70px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 50; flex-shrink: 0;}
        .nav-item { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; transition: var(--transition); }
        .nav-item:hover, .nav-item.active { background: var(--primary-light); color: var(--primary); }
        .nav-spacer { flex-grow: 1; }

        /* Tree Sidebar */
        #list-sidebar { width: 340px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; z-index: 40; flex-shrink: 0;}
        .sidebar-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0 0 16px; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
        .search-bar { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-base); color: var(--text-main); outline: none; transition: var(--transition); box-sizing: border-box; }
        
        #tree-root { flex-grow: 1; overflow-y: auto; padding: 16px 24px; }
        .node-container { margin-left: 20px; position: relative; }
        .node-container::before { content: ''; position: absolute; top: 0; bottom: 0; left: -11px; width: 1px; background-color: var(--border); }
        .node-label { display: flex; justify-content: flex-start; align-items: center; padding: 6px 8px; margin: 2px 0; border-radius: 8px; font-size: 0.9rem; transition: var(--transition); user-select: none; border: 1px solid transparent; cursor: pointer;}
        .node-label:hover { background-color: var(--bg-base); }
        .node-label.drag-over { background-color: var(--primary-light); border: 1px dashed var(--primary); }
        
        .toggle-arrow { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 4px; cursor: pointer; color: var(--text-muted); font-size: 0.75rem; margin-right: 4px; transition: var(--transition); }
        .toggle-placeholder { width: 20px; margin-right: 4px; display: inline-block; }
        .icon-box { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin-right: 8px; border-radius: 6px; background: var(--border); color: var(--text-muted); font-size: 10px; }

        /* Main Content */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-base); overflow: hidden; }
        .top-bar { height: 70px; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 30; }
        .top-bar-title { font-size: 1.1rem; font-weight: 600; }
        
        .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: var(--transition); border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }

        .view-container { flex-grow: 1; overflow-y: auto; padding: 32px; display: none; }
        .view-container.active { display: flex; flex-direction: column; }

        /* Dashboard & Metric Cards */
        .metric-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 32px 0; }
        .metric-card { background: var(--bg-panel); padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .metric-card .value { font-size: 2rem; font-weight: 700; color: var(--text-main); }
        .value.revenue { color: var(--success); }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-day { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-md); min-height: 120px; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .job-pill { background: #f3e8ff; color: var(--purple); font-size: 0.75rem; padding: 4px 6px; border-radius: 6px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Profile */
        .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; }
        .avatar-lg { width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: white; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }

        /* Timeline */
        .tl-item { padding: 16px; border-radius: 12px; background: var(--bg-base); margin-bottom: 12px; border: 1px solid var(--border); display: flex; gap: 12px;}
        .timeline-input { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }

        /* Pipeline */
        #pipeline-view { height: 100%; display: flex; gap: 24px; overflow-x: auto; padding-bottom: 20px; }
        .kanban-col { flex: 0 0 340px; display: flex; flex-direction: column; background: var(--bg-panel); border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .kanban-card { background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; cursor: grab; }

        /* Modal */
        #modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-panel); width: 90%; max-width: 600px; border-radius: var(--radius-xl); padding: 32px; max-height: 90vh; overflow-y: auto;}

        #cloud-status { position: fixed; bottom: 80px; right: 10px; font-size: 0.75rem; color: var(--text-muted); z-index: 99; background: var(--bg-panel); padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); }

        /* =======================================================
           📱 RESPONSIVE MOBILE OVERRIDES
           ======================================================= */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #app-container { flex-direction: column; }
            #nav-sidebar { width: 100%; height: 70px; flex-direction: row; border-right: none; border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; padding: 0; justify-content: space-around; }
            .nav-item { margin-bottom: 0; }
            .nav-spacer { display: none; }
            #list-sidebar { width: 100%; height: calc(100vh - 70px); position: absolute; top: 0; left: 0; z-index: 45; display: none; }
            #main-content { width: 100%; height: calc(100vh - 70px); margin-bottom: 70px; }
            .top-bar { padding: 0 16px; height: 60px; }
            #btn-export-csv { display: none; }
            .view-container { padding: 16px; padding-bottom: 100px; }
            .content-grid { grid-template-columns: 1fr; }
            .metric-cards { grid-template-columns: 1fr 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
            #profile-actions { flex-direction: column; width: 100%; gap: 10px; }
            #profile-actions .btn { width: 100%; }
            #cloud-status { bottom: 85px; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="nav-sidebar">
            <div class="nav-item active" id="nav-dashboard" title="Dashboard">📈</div>
            <div class="nav-item" id="nav-calendar" title="Calendar & Jobs">📅</div>
            <div class="nav-item" id="nav-directory" title="Directory">📁</div>
            <div class="nav-item" id="nav-pipeline" title="Pipeline">📊</div>
            <div class="nav-spacer"></div>
            <div class="nav-item" id="btn-theme" title="Toggle Theme">☀️</div>
        </div>

        <div id="list-sidebar">
            <div class="sidebar-header">
                <h2>Directory</h2>
                <input type="text" id="searchInput" class="search-bar" placeholder="Search records...">
            </div>
            <div id="tree-root"></div>
        </div>

        <div id="main-content">
            <div class="top-bar">
                <div class="top-bar-title" id="top-title">Dashboard</div>
                <div class="top-bar-actions">
                    <button class="btn btn-outline" id="btn-export-csv">📄 CSV</button>
                    <button class="btn btn-primary" id="btn-add-global">➕ Add</button>
                </div>
            </div>

            <div id="view-dashboard" class="view-container active">
                <div class="metric-cards">
                    <div class="metric-card"><h3>Total Records</h3><div class="value" id="dash-total-contacts">0</div></div>
                    <div class="metric-card"><h3>Active Deals</h3><div class="value" id="dash-active-deals">0</div></div>
                    <div class="metric-card"><h3>Pipeline Value</h3><div class="value revenue" id="dash-pipe-val">$0</div></div>
                    <div class="metric-card"><h3>Closed Won</h3><div class="value revenue" id="dash-closed-val">$0</div></div>
                </div>
            </div>

            <div id="view-calendar" class="view-container">
                <div class="cal-header-controls"><h1 id="cal-month-title">Month</h1><div><button class="btn btn-outline" onclick="changeMonth(-1)">◀</button><button class="btn btn-outline" onclick="changeMonth(1)">▶</button></div></div>
                <div class="calendar-grid"><div class="cal-day-label">S</div><div class="cal-day-label">M</div><div class="cal-day-label">T</div><div class="cal-day-label">W</div><div class="cal-day-label">T</div><div class="cal-day-label">F</div><div class="cal-day-label">S</div></div>
                <div class="calendar-grid" id="cal-grid"></div>
            </div>

            <div id="view-profile" class="view-container">
                <div class="profile-header">
                    <div class="avatar-lg" id="prof-avatar"></div>
                    <div>
                        <h1 id="prof-name"></h1>
                        <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 12px; justify-content: center;">
                            <span class="status-badge" id="prof-status"></span>
                            <span class="deal-value-badge" id="prof-value" style="font-weight:bold; color:var(--success)"></span>
                        </div>
                        <div id="profile-actions" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
                            <button class="btn btn-primary" id="btn-add-sub">➕ Sub-Entry</button>
                            <button class="btn btn-outline" id="btn-edit-profile">✏️ Edit</button>
                            <button class="btn btn-outline" id="btn-delete-profile" style="color: var(--danger);">🗑️ Delete</button>
                        </div>
                    </div>
                </div>
                <div class="content-grid">
                    <div class="panel">
                        <h3>Details</h3>
                        <div class="info-row"><div class="info-content"><div class="info-label">Parent</div><div id="prof-parent"></div></div></div>
                        <div class="info-row"><div class="info-content"><div class="info-label">Email</div><div id="prof-email"></div></div></div>
                        <div class="info-row"><div class="info-content"><div class="info-label">Phone</div><div id="prof-phone"></div></div></div>
                        <div id="prof-custom-fields-container"></div>
                    </div>
                    <div class="panel">
                        <h3>Scheduling</h3>
                        <div class="timeline-input">
                            <select id="act-type" class="form-control"><option value="job">📅 Job</option><option value="task">✅ Task</option><option value="call">📞 Call</option></select>
                            <input type="date" id="act-date" class="form-control">
                            <input type="text" id="act-text" class="form-control" placeholder="Description..." style="width: 100%; margin-top: 8px;">
                            <button class="btn btn-primary" id="btn-log-act" style="width: 100%; margin-top: 8px;">Log</button>
                        </div>
                        <div id="prof-timeline"></div>
                    </div>
                </div>
            </div>

            <div id="view-pipeline" class="view-container">
                <div id="pipeline-view">
                    <div class="kanban-col" data-status="Lead"><div class="kanban-header">Leads <span id="rev-lead"></span></div><div class="kanban-body" id="col-lead" ondragover="event.preventDefault()" ondrop="dropKanban(event, 'Lead')"></div></div>
                    <div class="kanban-col" data-status="Active"><div class="kanban-header">Active <span id="rev-active"></span></div><div class="kanban-body" id="col-active" ondragover="event.preventDefault()" ondrop="dropKanban(event, 'Active')"></div></div>
                    <div class="kanban-col" data-status="Closed"><div class="kanban-header">Closed <span id="rev-closed"></span></div><div class="kanban-body" id="col-closed" ondragover="event.preventDefault()" ondrop="dropKanban(event, 'Closed')"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Entry</h2>
            <form id="entry-form">
                <div class="form-group" id="modal-type-group"><label>Type</label><select id="modal-type" class="form-control"><option value="contact">👤 Contact</option><option value="company">🏢 Company</option><option value="location">📂 Folder</option></select></div>
                <div class="form-group" id="modal-parent-group"><label>Parent</label><select id="modal-parent" class="form-control"></select></div>
                <div class="form-group"><label>Name</label><input type="text" id="modal-name" class="form-control" required></div>
                <div class="form-group"><label>Pipeline Status</label><select id="modal-status" class="form-control"><option value="Lead">Lead</option><option value="Active">In Progress</option><option value="Closed">Closed / Won</option></select></div>
                <div class="form-group"><label>Value ($)</label><input type="number" id="modal-value" class="form-control"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="modal-phone" class="form-control"></div>
                <div class="form-group"><label>Email</label><input type="email" id="modal-email" class="form-control"></div>
                <div id="custom-fields-editor"></div>
                <button type="button" class="btn btn-outline" style="width:100%; margin: 10px 0;" onclick="addCustomFieldRow()">+ Custom Field</button>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="cloud-status">💾 Local</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNtfKuegpo-3GAr3r36EfhCa1ynzOkA1M",
            authDomain: "ls-crm-test.firebaseapp.com",
            projectId: "ls-crm-test",
            storageBucket: "ls-crm-test.firebasestorage.app",
            messagingSenderId: "784881503676",
            appId: "1:784881503676:web:22df7257bf0a1757282fb9"
        };

        window.isCloudReady = firebaseConfig.apiKey.indexOf("AIza") === 0;
        if (window.isCloudReady) {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.fbDoc = doc; window.fbGetDoc = getDoc; window.fbSetDoc = setDoc;
            document.getElementById('cloud-status').innerText = '☁️ Cloud Sync';
        }
    </script>

    <script>
        const defaultData = { id: 'root', name: 'Global Directory', type: 'location', isOpen: true, children: [ { id: 'loc_usa', name: 'United States', type: 'location', isOpen: true, children: [ { id: 'st_al', name: 'Alabama', type: 'location', children: [] }, { id: 'st_ca', name: 'California', type: 'location', children: [] }, { id: 'st_fl', name: 'Florida', type: 'location', children: [] }, { id: 'st_tx', name: 'Texas', type: 'location', children: [] }, { id: 'st_ny', name: 'New York', type: 'location', children: [] } ] } ] };
        
        let crmData = defaultData;
        let activeContact = null; let activeContactParentName = ''; let editingId = null; let searchQuery = '';
        const inputDate = document.getElementById('act-date');
        if(inputDate) inputDate.value = new Date().toISOString().split('T')[0];

        async function loadData() {
            setTimeout(async () => {
                if (window.isCloudReady && window.db) {
                    try {
                        const docSnap = await window.fbGetDoc(window.fbDoc(window.db, "crm", "master_v5"));
                        if (docSnap.exists()) { crmData = docSnap.data(); } 
                        else { await window.fbSetDoc(window.fbDoc(window.db, "crm", "master_v5"), defaultData); crmData = defaultData; }
                    } catch(e) { crmData = defaultData; }
                } else {
                    crmData = JSON.parse(localStorage.getItem('crm_pro_editable_v1')) || defaultData;
                }
                renderTree(); updateDashboard(); renderCalendar(); switchNav('dashboard');
            }, 200);
        }

        const save = async () => { 
            if (window.isCloudReady && window.db) {
                try { await window.fbSetDoc(window.fbDoc(window.db, "crm", "master_v5"), crmData); } catch(e) {}
            } else {
                localStorage.setItem('crm_pro_editable_v1', JSON.stringify(crmData)); 
            }
            renderTree(); if(activeContact) loadProfile(activeContact, activeContactParentName); updateDashboard(); renderCalendar(); 
        };

        const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num || 0);
        const getColor = (n) => ['#ef4444', '#f97316', '#10b981', '#06b6d4', '#6366f1'][Math.abs([...n].reduce((a,b)=>a+b.charCodeAt(0),0)) % 5];
        const getInitials = (n) => n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

        function switchNav(view) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            const isMobile = window.innerWidth <= 768;
            let navTarget = view === 'profile' ? 'directory' : view;
            const navItem = document.getElementById('nav-' + navTarget);
            if(navItem) navItem.classList.add('active');

            if (isMobile) {
                document.getElementById('list-sidebar').style.display = (view === 'directory') ? 'flex' : 'none';
                document.getElementById('main-content').style.display = (view === 'directory') ? 'none' : 'flex';
            } else {
                document.getElementById('list-sidebar').style.display = (view === 'dashboard' || view === 'pipeline' || view === 'calendar') ? 'none' : 'flex';
                document.getElementById('main-content').style.display = 'flex';
            }

            const container = document.getElementById('view-' + (view === 'directory' ? 'dashboard' : view));
            if(container) container.classList.add('active');
            document.getElementById('top-title').innerText = view.charAt(0).toUpperCase() + view.slice(1);
            if(view === 'dashboard') updateDashboard();
            if(view === 'calendar') renderCalendar();
            if(view === 'pipeline') renderKanban();
        }

        document.getElementById('nav-dashboard').onclick = () => switchNav('dashboard');
        document.getElementById('nav-calendar').onclick = () => switchNav('calendar');
        document.getElementById('nav-directory').onclick = () => switchNav('directory');
        document.getElementById('nav-pipeline').onclick = () => switchNav('pipeline');

        function renderTree() {
            const root = document.getElementById('tree-root'); root.innerHTML = '';
            const renderNode = (node, parentEl, parentName) => {
                if(searchQuery && !node.name.toLowerCase().includes(searchQuery)) return false;
                const nodeDiv = document.createElement('div'); nodeDiv.className = node.id === 'root' ? '' : 'node-container';
                const label = document.createElement('div'); label.className = `node-label ${node.type}-node`;
                const arrow = document.createElement('span');
                if (node.children && node.children.length > 0) {
                    arrow.className = 'toggle-arrow'; arrow.innerHTML = node.isOpen ? '▼' : '▶';
                    arrow.onclick = (e) => { e.stopPropagation(); node.isOpen = !node.isOpen; save(); };
                } else { arrow.className = 'toggle-placeholder'; }
                const nameContainer = document.createElement('div'); nameContainer.style.display = 'flex'; nameContainer.style.alignItems = 'center';
                let icon = node.type === 'location' ? '📂' : node.type === 'company' ? '🏢' : '👤';
                nameContainer.innerHTML = `<span class="icon-box">${icon}</span>${node.name}`;
                label.appendChild(arrow); label.appendChild(nameContainer);
                label.onclick = () => loadProfile(node, parentName);
                nodeDiv.appendChild(label);
                if (node.isOpen && node.children) {
                    const childrenDiv = document.createElement('div');
                    node.children.forEach(child => renderNode(child, childrenDiv, node.name));
                    nodeDiv.appendChild(childrenDiv);
                }
                parentEl.appendChild(nodeDiv); return true;
            };
            renderNode(crmData, root, '');
        }

        function loadProfile(contact, parentName) {
            activeContact = contact; activeContactParentName = parentName;
            document.getElementById('prof-name').innerText = contact.name;
            const det = contact.details || { status: 'Lead', value: 0, email: '', phone: '', customFields: [], history: [] };
            document.getElementById('prof-status').innerText = det.status || 'Lead';
            document.getElementById('prof-value').innerText = det.value ? formatCurrency(det.value) : '';
            document.getElementById('prof-email').innerText = det.email || 'N/A';
            document.getElementById('prof-phone').innerText = det.phone || 'N/A';
            document.getElementById('prof-parent').innerText = parentName || 'Root';
            const av = document.getElementById('prof-avatar');
            av.innerText = getInitials(contact.name); av.style.background = getColor(contact.name);
            const tl = document.getElementById('prof-timeline'); tl.innerHTML = '';
            if(det.history) { det.history.forEach(h => {
                const div = document.createElement('div'); div.className = 'tl-item';
                div.innerHTML = `<div><strong>${h.type.toUpperCase()}</strong> - ${h.date}</div><div>${h.content}</div>`;
                tl.appendChild(div);
            }); }
            switchNav('profile');
        }

        /* --- EDITING LOGIC --- */
        document.getElementById('btn-edit-profile').onclick = () => {
            if(!activeContact) return;
            editingId = activeContact.id;
            document.getElementById('modal-title').innerText = 'Edit Entry';
            document.getElementById('modal-type-group').style.display = 'none';
            document.getElementById('modal-parent-group').style.display = 'none';
            document.getElementById('modal-name').value = activeContact.name;
            const det = activeContact.details || {};
            document.getElementById('modal-status').value = det.status || 'Lead';
            document.getElementById('modal-value').value = det.value || '';
            document.getElementById('modal-phone').value = det.phone || '';
            document.getElementById('modal-email').value = det.email || '';
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        document.getElementById('btn-add-sub').onclick = () => {
            if(!activeContact) return;
            editingId = null;
            document.getElementById('modal-title').innerText = 'Add Under ' + activeContact.name;
            document.getElementById('modal-type-group').style.display = 'block';
            document.getElementById('modal-parent-group').style.display = 'none';
            document.getElementById('entry-form').reset();
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        document.getElementById('btn-add-global').onclick = () => {
            editingId = null;
            document.getElementById('modal-title').innerText = 'Add Entry';
            document.getElementById('modal-type-group').style.display = 'block';
            document.getElementById('modal-parent-group').style.display = 'block';
            const sel = document.getElementById('modal-parent'); sel.innerHTML = '';
            const fill = (n, d="") => {
                const opt = document.createElement('option'); opt.value = n.id; opt.innerText = d + n.name;
                sel.appendChild(opt); if(n.children) n.children.forEach(c => fill(c, d+"--"));
            };
            fill(crmData);
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; };

        document.getElementById('entry-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('modal-name').value;
            const status = document.getElementById('modal-status').value;
            const val = document.getElementById('modal-value').value;
            const email = document.getElementById('modal-email').value;
            const phone = document.getElementById('modal-phone').value;

            if (editingId) {
                // UPDATE EXISTING
                const findAndUpdate = (n) => {
                    if(n.id === editingId) {
                        n.name = name;
                        if(!n.details) n.details = {};
                        n.details.status = status; n.details.value = val; n.details.email = email; n.details.phone = phone;
                        return true;
                    }
                    if(n.children) return n.children.some(findAndUpdate);
                };
                findAndUpdate(crmData);
            } else {
                // ADD NEW
                const parentId = document.getElementById('modal-parent-group').style.display === 'none' ? activeContact.id : document.getElementById('modal-parent').value;
                const newNode = {
                    id: 'id_' + Date.now(), name: name, type: document.getElementById('modal-type').value,
                    details: { status: status, value: val, email: email, phone: phone, history: [] },
                    children: []
                };
                const findAndAdd = (n) => {
                    if(n.id === parentId) { n.children.push(newNode); n.isOpen = true; return true; }
                    if(n.children) return n.children.some(findAndAdd);
                };
                findAndAdd(crmData);
            }
            save(); closeModal();
        };

        document.getElementById('btn-delete-profile').onclick = () => {
            if(!activeContact || activeContact.id === 'root') return;
            if(confirm('Delete ' + activeContact.name + '?')) {
                const findAndDelete = (parent) => {
                    if(!parent.children) return false;
                    const idx = parent.children.findIndex(c => c.id === activeContact.id);
                    if(idx !== -1) { parent.children.splice(idx, 1); return true; }
                    return parent.children.some(findAndDelete);
                };
                findAndDelete(crmData);
                activeContact = null; save(); switchNav('dashboard');
            }
        };

        function updateDashboard() {
            let total = 0, active = 0, val = 0, closed = 0;
            const walk = (n) => {
                total++; if(n.details) {
                    if(n.details.status === 'Active') active++;
                    if(n.details.status === 'Closed') closed += Number(n.details.value || 0);
                    val += Number(n.details.value || 0);
                }
                if(n.children) n.children.forEach(walk);
            };
            walk(crmData);
            document.getElementById('dash-total-contacts').innerText = total;
            document.getElementById('dash-active-deals').innerText = active;
            document.getElementById('dash-pipe-val').innerText = formatCurrency(val);
            document.getElementById('dash-closed-val').innerText = formatCurrency(closed);
        }

        loadData();
    </script>
</body>
</html>
