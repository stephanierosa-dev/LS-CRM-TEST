<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro CRM - Master Unified</title>
    <style>
        /* --- MODERN UI & THEME ENGINE --- */
        :root {
            --bg-base: #f1f5f9; --bg-panel: #ffffff; --bg-glass: rgba(255, 255, 255, 0.85);
            --border: #e2e8f0; --border-hover: #cbd5e1;
            --text-main: #0f172a; --text-muted: #64748b;
            --primary: #2563eb; --primary-hover: #1d4ed8; --primary-light: #dbeafe;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --bg-base: #0f172a; --bg-panel: #1e293b; --bg-glass: rgba(30, 41, 59, 0.85);
            --border: #334155; --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #3b82f6; --primary-light: #1e3a8a;
        }

        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; background-color: var(--bg-base); color: var(--text-main); -webkit-font-smoothing: antialiased; overflow: hidden; }
        #app-container { display: flex; width: 100%; height: 100%; position: relative; }

        /* Navigation Sidebar */
        #nav-sidebar { width: 70px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 50; flex-shrink: 0;}
        .nav-item { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; transition: var(--transition); }
        .nav-item:hover, .nav-item.active { background: var(--primary-light); color: var(--primary); }
        .nav-spacer { flex-grow: 1; }

        /* Directory Tree Sidebar */
        #list-sidebar { width: 340px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; z-index: 40; flex-shrink: 0;}
        .sidebar-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0 0 16px; font-size: 1.25rem; font-weight: 700; }
        .search-bar { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-base); color: var(--text-main); outline: none; box-sizing: border-box; }
        
        #tree-root { flex-grow: 1; overflow-y: auto; padding: 16px 24px; }
        .node-container { margin-left: 18px; position: relative; border-left: 1px solid var(--border); }
        .node-label { display: flex; align-items: center; padding: 6px 8px; margin: 2px 0; border-radius: 8px; font-size: 0.9rem; cursor: pointer; transition: var(--transition); }
        .node-label:hover { background-color: var(--bg-base); }
        .toggle-arrow { width: 20px; text-align: center; color: var(--text-muted); font-size: 0.7rem; }
        .icon-box { margin: 0 8px; font-size: 14px; }

        /* Main Content View */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-base); overflow: hidden; }
        .top-bar { height: 70px; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 30; }
        .top-bar-title { font-size: 1.1rem; font-weight: 600; }
        
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { color: var(--danger); border: 1px solid #fca5a5; background: transparent; }

        .view-container { flex-grow: 1; overflow-y: auto; padding: 32px; display: none; }
        .view-container.active { display: flex; flex-direction: column; }

        /* Dashboard */
        .metric-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .metric-card { background: var(--bg-panel); padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .metric-card .value { font-size: 2rem; font-weight: 700; }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-day-label { text-align: center; font-weight: 600; color: var(--text-muted); font-size: 0.8rem; padding: 10px 0; }
        .cal-day { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-md); min-height: 110px; padding: 6px; display: flex; flex-direction: column; gap: 4px; overflow: hidden;}
        .cal-day-num { font-size: 0.75rem; font-weight: bold; color: var(--text-muted); text-align: right; margin-bottom: 4px;}
        .cal-day.today { border: 2px solid var(--primary); background: var(--primary-light); }
        .cal-day.empty { background: transparent; border: none; }
        .job-pill { background: var(--primary-light); color: var(--primary); padding: 4px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

        /* Pipeline / Kanban */
        #pipeline-view { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 20px; height: 100%; }
        .kanban-col { flex: 0 0 320px; display: flex; flex-direction: column; background: rgba(100,100,100,0.05); border-radius: var(--radius-lg); border: 1px solid var(--border); min-height: 500px; }
        .kanban-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .kanban-body { padding: 16px; flex-grow: 1; overflow-y: auto; }
        .kanban-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; cursor: grab; box-shadow: var(--shadow-sm); }
        .kanban-card h4 { margin: 0 0 4px 0; font-size: 0.95rem; }
        .kanban-card p { margin: 0; font-size: 0.75rem; color: var(--text-muted); }
        .kanban-val { margin-top: 10px; font-weight: bold; color: var(--success); font-size: 0.85rem; }

        /* Profile Layout */
        .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; flex-wrap: wrap;}
        .avatar-lg { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: white; background: var(--primary); }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
        .info-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .info-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }

        /* Timeline Items */
        .tl-item { padding: 12px; border-radius: 8px; background: var(--bg-base); border: 1px solid var(--border); margin-bottom: 10px; font-size: 0.85rem; }

        /* Modal Popup */
        #modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-panel); width: 95%; max-width: 550px; border-radius: var(--radius-xl); padding: 24px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .form-control { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-base); color: var(--text-main); font-size: 1rem; box-sizing: border-box; outline: none; }

        #cloud-status { position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: var(--text-muted); background: var(--bg-panel); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); z-index: 99; }

        /* =======================================================
           📱 MOBILE REPAIRS
           ======================================================= */
        @media (max-width: 768px) {
            #nav-sidebar { width: 100%; height: 70px; flex-direction: row; border-right: none; border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; justify-content: space-around; padding: 0; }
            #list-sidebar { width: 100%; height: calc(100vh - 70px); position: absolute; top: 0; left: 0; z-index: 45; display: none; }
            #main-content { width: 100%; height: calc(100vh - 70px); margin-bottom: 70px; }
            .content-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
            .top-bar { padding: 0 16px; }
            #btn-export-csv { display: none; }
            .metric-cards { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body data-theme="dark">

        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0;">Edit Entry</h2>
            <form id="entry-form">
                <div class="form-group" id="modal-type-group"><label>Type</label><select id="modal-type" class="form-control"><option value="location">📂 Folder/Location</option><option value="company">🏢 Company</option><option value="contact">👤 Contact</option></select></div>

    <div id="cloud-status">💾 Loading Engine...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNtfKuegpo-3GAr3r36EfhCa1ynzOkA1M",
            authDomain: "ls-crm-test.firebaseapp.com",
            projectId: "ls-crm-test",
            storageBucket: "ls-crm-test.firebasestorage.app",
            messagingSenderId: "784881503676",
            appId: "1:784881503676:web:22df7257bf0a1757282fb9"
        };

        window.isCloudReady = firebaseConfig.apiKey.indexOf("AIza") === 0;
        if (window.isCloudReady) {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.fbDoc = doc; window.fbGetDoc = getDoc; window.fbSetDoc = setDoc;
            document.getElementById('cloud-status').innerText = '☁️ Cloud Connected';
        }
    </script>

    <script>
        const US_STATES = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];
        const stateNodes = US_STATES.map(s => ({ id: 'st_'+s.toLowerCase().replace(/ /g,'_'), name: s, type: 'location', details: { status: 'Lead', value: 0, history: [] }, children: [] }));
        const defaultData = { id: 'root', name: 'Global Directory', type: 'location', isOpen: true, children: [ { id: 'loc_usa', name: 'United States', type: 'location', isOpen: true, children: stateNodes } ] };
        
        let crmData = defaultData;
        let activeContact = null; let editingId = null; let searchQuery = '';
        let curM = new Date().getMonth(); let curY = new Date().getFullYear();

        // ---------------------------------------------------------
        // CLOUD & STATE ENGINE
        // ---------------------------------------------------------
        async function loadData() {
            setTimeout(async () => {
                if (window.isCloudReady && window.db) {
                    try {
                        const docSnap = await window.fbGetDoc(window.fbDoc(window.db, "crm", "master_v7"));
                        if (docSnap.exists()) { crmData = docSnap.data(); } 
                        else { await window.fbSetDoc(window.fbDoc(window.db, "crm", "master_v7"), defaultData); crmData = defaultData; }
                    } catch(e) { crmData = defaultData; }
                } else {
                    crmData = JSON.parse(localStorage.getItem('crm_pro_v7')) || defaultData;
                }
                renderTree(); updateDashboard(); switchNav('dashboard');
            }, 300);
        }

        const save = async () => { 
            if (window.isCloudReady && window.db) {
                try { await window.fbSetDoc(window.fbDoc(window.db, "crm", "master_v7"), crmData); } catch(e) {}
            } else {
                localStorage.setItem('crm_pro_v7', JSON.stringify(crmData)); 
            }
            renderTree(); updateDashboard(); 
            if (activeContact) loadProfile(activeContact); 
        };

        const formatCurrency = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n || 0);

        // ---------------------------------------------------------
        // NAVIGATION ENGINE
        // ---------------------------------------------------------
        function switchNav(v) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            const isMobile = window.innerWidth <= 768;
            
            let navTarget = v === 'profile' ? 'directory' : v;
            const navItem = document.getElementById('nav-' + navTarget);
            if(navItem) navItem.classList.add('active');

            if (isMobile) {
                document.getElementById('list-sidebar').style.display = (v === 'directory') ? 'flex' : 'none';
                document.getElementById('main-content').style.display = (v === 'directory') ? 'none' : 'flex';
            } else {
                document.getElementById('list-sidebar').style.display = (v === 'dashboard' || v === 'calendar' || v === 'pipeline') ? 'none' : 'flex';
                document.getElementById('main-content').style.display = 'flex';
            }

            const targetView = document.getElementById('view-' + (v === 'directory' ? 'dashboard' : v));
            if(targetView) targetView.classList.add('active');
            document.getElementById('top-title').innerText = v.toUpperCase();
            
            if(v === 'dashboard') updateDashboard();
            if(v === 'calendar') renderCalendar();
            if(v === 'pipeline') renderKanban();
        }

        document.getElementById('nav-dashboard').onclick = () => switchNav('dashboard');
        document.getElementById('nav-directory').onclick = () => switchNav('directory');
        document.getElementById('nav-calendar').onclick = () => switchNav('calendar');
        document.getElementById('nav-pipeline').onclick = () => switchNav('pipeline');

        // ---------------------------------------------------------
        // KANBAN ENGINE
        // ---------------------------------------------------------
        function renderKanban() {
            const cols = { lead: document.getElementById('col-lead'), active: document.getElementById('col-active'), closed: document.getElementById('col-closed') };
            const revs = { lead: 0, active: 0, closed: 0 };
            Object.values(cols).forEach(c => c.innerHTML = '');

            function findDeals(n) {
                const s = (n.details?.status || '').toLowerCase();
                if (s === 'lead' || s === 'active' || s === 'closed') {
                    const card = document.createElement('div'); card.className = 'kanban-card';
                    card.innerHTML = `<h4>${n.name}</h4><p>${n.details.title || 'Account'}</p><div class="kanban-val">${formatCurrency(n.details.value)}</div>`;
                    card.onclick = () => loadProfile(n);
                    cols[s].appendChild(card);
                    revs[s] += Number(n.details.value || 0);
                }
                if (n.children) n.children.forEach(findDeals);
            }
            findDeals(crmData);
            document.getElementById('rev-lead').innerText = formatCurrency(revs.lead);
            document.getElementById('rev-active').innerText = formatCurrency(revs.active);
            document.getElementById('rev-closed').innerText = formatCurrency(revs.closed);
        }

        // ---------------------------------------------------------
        // CALENDAR ENGINE
        // ---------------------------------------------------------
        window.changeMonth = (d) => { curM += d; if(curM<0){curM=11;curY--;} if(curM>11){curM=0;curY++;} renderCalendar(); };
        function renderCalendar() {
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('cal-month-title').innerText = `${months[curM]} ${curY}`;
            
            const first = new Date(curY, curM, 1).getDay();
            const days = new Date(curY, curM+1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div class="cal-day empty"></div>';
            
            const jobs = [];
            function findJobs(n) {
                if(n.details?.history) n.details.history.forEach(h => { if(h.type === 'job') jobs.push({n, h}); });
                if(n.children) n.children.forEach(findJobs);
            }
            findJobs(crmData);

            for(let d=1; d<=days; d++) {
                const dayDiv = document.createElement('div'); dayDiv.className = 'cal-day';
                dayDiv.innerHTML = `<div class="cal-day-num">${d}</div>`;
                const dateStr = `${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                jobs.filter(j => j.h.date === dateStr).forEach(j => {
                    const p = document.createElement('div'); p.className = 'job-pill';
                    p.innerText = `${j.n.name}: ${j.h.content}`;
                    p.onclick = (e) => { e.stopPropagation(); loadProfile(j.n); };
                    dayDiv.appendChild(p);
                });
                grid.appendChild(dayDiv);
            }
        }

        // ---------------------------------------------------------
        // DIRECTORY & PROFILE ENGINE
        // ---------------------------------------------------------
        function renderTree() {
            const root = document.getElementById('tree-root'); root.innerHTML = '';
            const renderNode = (n, pEl) => {
                if(searchQuery && !n.name.toLowerCase().includes(searchQuery)) return false;
                const div = document.createElement('div'); div.className = n.id==='root'?'':'node-container';
                const label = document.createElement('div'); label.className = 'node-label';
                const arrow = (n.children && n.children.length>0) ? `<span class="toggle-arrow" onclick="event.stopPropagation(); crmData=toggleOpen(crmData,'${n.id}'); save();">${n.isOpen?'▼':'▶'}</span>` : '<span class="toggle-placeholder"></span>';
                let icon = n.type==='location'?'📂':n.type==='company'?'🏢':'👤';
                label.innerHTML = `${arrow} <span class="icon-box">${icon}</span> ${n.name}`;
                label.onclick = () => loadProfile(n);
                div.appendChild(label);
                if(n.isOpen && n.children) n.children.forEach(c => renderNode(c, div));
                pEl.appendChild(div); return true;
            };
            renderNode(crmData, root);
        }

        function toggleOpen(n, id) { if(n.id===id) n.isOpen = !n.isOpen; if(n.children) n.children.forEach(c=>toggleOpen(c,id)); return n; }

        function loadProfile(n) {
            activeContact = n;
            document.getElementById('prof-name').innerText = n.name;
            const d = n.details || {status:'Lead', value:0, history:[]};
            document.getElementById('prof-status').innerText = d.status || 'Lead';
            document.getElementById('prof-value').innerText = formatCurrency(d.value);
            document.getElementById('disp-title').innerText = d.title || 'Account';
            document.getElementById('disp-email').innerText = d.email || 'N/A';
            document.getElementById('disp-phone').innerText = d.phone || 'N/A';
            const tl = document.getElementById('prof-timeline'); tl.innerHTML = '';
            if(d.history) d.history.forEach(h => {
                tl.innerHTML += `<div class="tl-item"><strong>${h.type.toUpperCase()}</strong> (${h.date})<br>${h.content}</div>`;
            });
            switchNav('profile');
        }

        // ---------------------------------------------------------
        // FORMS & ACTIONS
        // ---------------------------------------------------------
        document.getElementById('btn-edit-profile').onclick = () => {
            editingId = activeContact.id;
            document.getElementById('modal-title').innerText = 'Edit Entry';
            document.getElementById('modal-parent-group').style.display = 'none';
            document.getElementById('modal-name').value = activeContact.name;
            const d = activeContact.details || {};
            document.getElementById('modal-status').value = d.status || 'Lead';
            document.getElementById('modal-value').value = d.value || 0;
            document.getElementById('modal-title-input').value = d.title || '';
            document.getElementById('modal-phone').value = d.phone || '';
            document.getElementById('modal-email').value = d.email || '';
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        document.getElementById('btn-add-sub').onclick = () => {
            editingId = null;
            document.getElementById('modal-title').innerText = 'Add Under ' + activeContact.name;
            document.getElementById('modal-parent-group').style.display = 'none';
            document.getElementById('entry-form').reset();
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        document.getElementById('btn-add-global').onclick = () => {
            editingId = null;
            document.getElementById('modal-title').innerText = 'Add Entry';
            document.getElementById('modal-parent-group').style.display = 'block';
            const sel = document.getElementById('modal-parent'); sel.innerHTML = '';
            const fill = (n, d="") => {
                const opt = document.createElement('option'); opt.value = n.id; opt.innerText = d + n.name;
                sel.appendChild(opt); if(n.children) n.children.forEach(c => fill(c, d+"--"));
            };
            fill(crmData);
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        document.getElementById('entry-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('modal-name').value,
                status: document.getElementById('modal-status').value,
                value: document.getElementById('modal-value').value,
                title: document.getElementById('modal-title-input').value,
                phone: document.getElementById('modal-phone').value,
                email: document.getElementById('modal-email').value
            };
            if(editingId) {
                const update = (n) => {
                    if(n.id===editingId) { n.name=payload.name; n.details={...n.details, ...payload}; return true; }
                    if(n.children) return n.children.some(update);
                };
                update(crmData);
            } else {
                const pId = document.getElementById('modal-parent-group').style.display==='none'?activeContact.id:document.getElementById('modal-parent').value;
                const newNode = { id: 'id_'+Date.now(), name: payload.name, type: document.getElementById('modal-type').value, details: {...payload, history:[]}, children:[] };
                const add = (n) => { if(n.id===pId){n.children.push(newNode); n.isOpen=true; return true;} if(n.children) return n.children.some(add); };
                add(crmData);
            }
            await save(); closeModal();
        };

        document.getElementById('btn-log-act').onclick = () => {
            const date = document.getElementById('act-date').value;
            const text = document.getElementById('act-text').value;
            if(!date || !text || !activeContact) return;
            if(!activeContact.details.history) activeContact.details.history = [];
            activeContact.details.history.push({ type: document.getElementById('act-type').value, date, content: text });
            document.getElementById('act-text').value = ''; save();
        };

        document.getElementById('btn-delete-profile').onclick = async () => {
            if(confirm('Delete this entry?')) {
                const del = (p) => {
                    const i = p.children.findIndex(c => c.id === activeContact.id);
                    if(i !== -1){ p.children.splice(i,1); return true; }
                    return p.children.some(del);
                };
                del(crmData); activeContact = null; await save(); switchNav('dashboard');
            }
        };

        window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

        function updateDashboard() {
            let total = 0, pipe = 0, active = 0, jobs = 0;
            const walk = (n) => {
                total++; pipe += Number(n.details?.value || 0);
                if(n.details?.status === 'Active') active++;
                if(n.details?.history) jobs += n.details.history.filter(h=>h.type==='job').length;
                if(n.children) n.children.forEach(walk);
            };
            walk(crmData);
            document.getElementById('dash-total').innerText = total;
            document.getElementById('dash-active').innerText = active;
            document.getElementById('dash-jobs').innerText = jobs;
            document.getElementById('dash-pipe-val').innerText = formatCurrency(pipe);
        }

        loadData();
    </script>
</body>
</html>
