<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro CRM - Master</title>
    <style>
        /* --- MODERN UI & THEME ENGINE --- */
        :root {
            --bg-base: #f1f5f9; --bg-panel: #ffffff; --bg-glass: rgba(255, 255, 255, 0.85);
            --border: #e2e8f0; --border-hover: #cbd5e1;
            --text-main: #0f172a; --text-muted: #64748b;
            --primary: #2563eb; --primary-hover: #1d4ed8; --primary-light: #dbeafe;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --bg-base: #0f172a; --bg-panel: #1e293b; --bg-glass: rgba(30, 41, 59, 0.85);
            --border: #334155; --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #3b82f6; --primary-light: #1e3a8a;
        }

        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; background-color: var(--bg-base); color: var(--text-main); -webkit-font-smoothing: antialiased; overflow: hidden; }
        #app-container { display: flex; width: 100%; height: 100%; position: relative; }

        /* Navigation Sidebar */
        #nav-sidebar { width: 70px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 50; flex-shrink: 0;}
        .nav-item { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; transition: var(--transition); }
        .nav-item:hover, .nav-item.active { background: var(--primary-light); color: var(--primary); }
        .nav-spacer { flex-grow: 1; }

        /* Directory Tree Sidebar */
        #list-sidebar { width: 340px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; z-index: 40; flex-shrink: 0;}
        .sidebar-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0 0 16px; font-size: 1.25rem; font-weight: 700; }
        .search-bar { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-base); color: var(--text-main); outline: none; box-sizing: border-box; }
        
        #tree-root { flex-grow: 1; overflow-y: auto; padding: 16px 24px; }
        .node-container { margin-left: 18px; position: relative; border-left: 1px solid var(--border); }
        .node-label { display: flex; align-items: center; padding: 6px 8px; margin: 2px 0; border-radius: 8px; font-size: 0.9rem; cursor: pointer; transition: var(--transition); }
        .node-label:hover { background-color: var(--bg-base); }
        .toggle-arrow { width: 20px; text-align: center; color: var(--text-muted); font-size: 0.7rem; }
        .icon-box { margin: 0 8px; font-size: 14px; }

        /* Main Content View */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-base); overflow: hidden; }
        .top-bar { height: 70px; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 30; }
        .top-bar-title { font-size: 1.1rem; font-weight: 600; }
        
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { color: var(--danger); border: 1px solid #fca5a5; background: transparent; }

        .view-container { flex-grow: 1; overflow-y: auto; padding: 32px; display: none; }
        .view-container.active { display: flex; flex-direction: column; }

        /* Dashboard & Grids */
        .metric-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .metric-card { background: var(--bg-panel); padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .metric-card .value { font-size: 2rem; font-weight: 700; }

        /* Profile Layout */
        .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; flex-wrap: wrap;}
        .avatar-lg { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: white; background: var(--primary); }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
        .info-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .info-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }

        /* Modal Popup */
        #modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-panel); width: 95%; max-width: 550px; border-radius: var(--radius-xl); padding: 24px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .form-control { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-base); color: var(--text-main); font-size: 1rem; box-sizing: border-box; outline: none; }

        #cloud-status { position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: var(--text-muted); background: var(--bg-panel); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); z-index: 99; }

        /* =======================================================
           📱 MOBILE REPAIRS
           ======================================================= */
        @media (max-width: 768px) {
            #nav-sidebar { width: 100%; height: 70px; flex-direction: row; border-right: none; border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; justify-content: space-around; padding: 0; }
            #list-sidebar { width: 100%; height: calc(100vh - 70px); position: absolute; top: 0; left: 0; z-index: 45; display: none; }
            #main-content { width: 100%; height: calc(100vh - 70px); margin-bottom: 70px; }
            .content-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
            .top-bar { padding: 0 16px; }
            #btn-export-csv { display: none; }
        }
    </style>
</head>
<body data-theme="dark">

    <div id="app-container">
        <div id="nav-sidebar">
            <div class="nav-item active" id="nav-dashboard">📈</div>
            <div class="nav-item" id="nav-calendar">📅</div>
            <div class="nav-item" id="nav-directory">📁</div>
            <div class="nav-item" id="nav-pipeline">📊</div>
            <div class="nav-spacer"></div>
            <div class="nav-item" id="btn-theme">☀️</div>
        </div>

        <div id="list-sidebar">
            <div class="sidebar-header">
                <h2>Directory</h2>
                <input type="text" id="searchInput" class="search-bar" placeholder="Search...">
            </div>
            <div id="tree-root"></div>
        </div>

        <div id="main-content">
            <div class="top-bar">
                <div class="top-bar-title" id="top-title">Dashboard</div>
                <div class="top-bar-actions">
                    <button class="btn btn-outline" id="btn-export-csv">📄 CSV</button>
                    <button class="btn btn-primary" id="btn-add-global">➕ Add</button>
                </div>
            </div>

            <div id="view-dashboard" class="view-container active">
                <div class="metric-cards">
                    <div class="metric-card"><div class="info-label">Total Entries</div><div class="value" id="dash-total">0</div></div>
                    <div class="metric-card"><div class="info-label">Active Deals</div><div class="value" id="dash-active">0</div></div>
                    <div class="metric-card"><div class="info-label">Pipeline Value</div><div class="value" id="dash-pipe-val" style="color:var(--success)">$0</div></div>
                </div>
            </div>

            <div id="view-calendar" class="view-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h1 id="cal-month-title">Month</h1>
                    <div><button class="btn btn-outline" onclick="changeMonth(-1)">◀</button><button class="btn btn-outline" onclick="changeMonth(1)">▶</button></div>
                </div>
                <div class="calendar-grid" id="cal-grid"></div>
            </div>

            <div id="view-profile" class="view-container">
                <div class="profile-header">
                    <div class="avatar-lg" id="prof-avatar"></div>
                    <div style="flex-grow:1;">
                        <h1 id="prof-name" style="margin:0 0 8px 0;">Name</h1>
                        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content: center;">
                            <span class="status-badge" id="prof-status" style="background:var(--primary-light); color:var(--primary); padding:4px 12px; border-radius:20px; font-weight:bold; font-size:0.7rem;">STATUS</span>
                            <span id="prof-value" style="font-weight:bold; color:var(--success)">$0</span>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="btn btn-primary" id="btn-add-sub">➕ Sub-Entry</button>
                        <button class="btn btn-outline" id="btn-edit-profile">✏️ Edit</button>
                        <button class="btn btn-danger" id="btn-delete-profile">🗑️</button>
                    </div>
                </div>
                <div class="content-grid">
                    <div class="panel">
                        <div class="info-row"><div class="info-label">Title/Role</div><div id="disp-title"></div></div>
                        <div class="info-row"><div class="info-label">Email</div><div id="disp-email"></div></div>
                        <div class="info-row"><div class="info-label">Phone</div><div id="disp-phone"></div></div>
                        <div id="prof-custom-fields"></div>
                    </div>
                    <div class="panel">
                        <div class="timeline-input">
                            <select id="act-type" class="form-control" style="width: auto;"><option value="job">📅 Job</option><option value="note">📝 Note</option></select>
                            <input type="date" id="act-date" class="form-control" style="width: 130px;">
                            <input type="text" id="act-text" class="form-control" placeholder="Details..." style="flex:1;">
                            <button class="btn btn-primary" id="btn-log-act">Add</button>
                        </div>
                        <div id="prof-timeline"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0;">Edit Entry</h2>
            <form id="entry-form">
                <div class="form-group" id="modal-type-group"><label>Type</label><select id="modal-type" class="form-control"><option value="location">📂 Folder/Location</option><option value="company">🏢 Company</option><option value="contact">👤 Contact</option></select></div>
                <div class="form-group" id="modal-parent-group"><label>Move Under Parent</label><select id="modal-parent" class="form-control"></select></div>
                <div class="form-group"><label>Name</label><input type="text" id="modal-name" class="form-control" required></div>
                <div class="form-group"><label>Pipeline Status</label><select id="modal-status" class="form-control"><option value="Lead">Lead</option><option value="Active">Active</option><option value="Closed">Closed</option></select></div>
                <div class="form-group"><label>Value ($)</label><input type="number" id="modal-value" class="form-control"></div>
                <div class="form-group"><label>Role / Title</label><input type="text" id="modal-title-input" class="form-control"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="modal-phone" class="form-control"></div>
                <div class="form-group"><label>Email</label><input type="email" id="modal-email" class="form-control"></div>
                
                <div class="modal-actions" style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" class="btn btn-outline" style="flex:1" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex:2">Save Entry</button>
                </div>
            </form>
        </div>
    </div>

    <div id="cloud-status">💾 Local Storage</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNtfKuegpo-3GAr3r36EfhCa1ynzOkA1M",
            authDomain: "ls-crm-test.firebaseapp.com",
            projectId: "ls-crm-test",
            storageBucket: "ls-crm-test.firebasestorage.app",
            messagingSenderId: "784881503676",
            appId: "1:784881503676:web:22df7257bf0a1757282fb9"
        };

        window.isCloudReady = firebaseConfig.apiKey.indexOf("AIza") === 0;
        if (window.isCloudReady) {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.fbDoc = doc; window.fbGetDoc = getDoc; window.fbSetDoc = setDoc;
            document.getElementById('cloud-status').innerText = '☁️ Cloud Sync Active';
        }
    </script>

    <script>
        const US_STATES = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];
        const stateNodes = US_STATES.map(s => ({ id: 'st_'+s.toLowerCase().replace(/ /g,'_'), name: s, type: 'location', details: { status: 'Lead', history: [] }, children: [] }));
        const defaultData = { id: 'root', name: 'Global Directory', type: 'location', isOpen: true, children: [ { id: 'loc_usa', name: 'United States', type: 'location', isOpen: true, children: stateNodes } ] };
        
        let crmData = defaultData;
        let activeContact = null; let editingId = null; let searchQuery = '';

        async function loadData() {
            setTimeout(async () => {
                if (window.isCloudReady && window.db) {
                    try {
                        const docSnap = await window.fbGetDoc(window.fbDoc(window.db, "crm", "master_v6"));
                        if (docSnap.exists()) { crmData = docSnap.data(); } 
                        else { await window.fbSetDoc(window.fbDoc(window.db, "crm", "master_v6"), defaultData); crmData = defaultData; }
                    } catch(e) { crmData = defaultData; }
                } else {
                    crmData = JSON.parse(localStorage.getItem('crm_pro_v6')) || defaultData;
                }
                renderTree(); updateDashboard(); switchNav('dashboard');
            }, 300);
        }

        const save = async () => { 
            if (window.isCloudReady && window.db) {
                try { await window.fbSetDoc(window.fbDoc(window.db, "crm", "master_v6"), crmData); } catch(e) {}
            } else {
                localStorage.setItem('crm_pro_v6', JSON.stringify(crmData)); 
            }
            renderTree(); updateDashboard(); 
            if (activeContact) loadProfile(activeContact); 
        };

        const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num || 0);

        function switchNav(view) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            const isMobile = window.innerWidth <= 768;
            
            let navTarget = view === 'profile' ? 'directory' : view;
            const navItem = document.getElementById('nav-' + navTarget);
            if(navItem) navItem.classList.add('active');

            if (isMobile) {
                document.getElementById('list-sidebar').style.display = (view === 'directory') ? 'flex' : 'none';
                document.getElementById('main-content').style.display = (view === 'directory') ? 'none' : 'flex';
            } else {
                document.getElementById('list-sidebar').style.display = (view === 'dashboard' || view === 'calendar' || view === 'pipeline') ? 'none' : 'flex';
                document.getElementById('main-content').style.display = 'flex';
            }

            const container = document.getElementById('view-' + (view === 'directory' ? 'dashboard' : view));
            if(container) container.classList.add('active');
            document.getElementById('top-title').innerText = view.toUpperCase();
            if(view === 'dashboard') updateDashboard();
            if(view === 'calendar') renderCalendar();
        }

        document.getElementById('nav-dashboard').onclick = () => switchNav('dashboard');
        document.getElementById('nav-directory').onclick = () => switchNav('directory');
        document.getElementById('nav-calendar').onclick = () => switchNav('calendar');

        function renderTree() {
            const root = document.getElementById('tree-root'); root.innerHTML = '';
            const renderNode = (node, parentEl) => {
                if(searchQuery && !node.name.toLowerCase().includes(searchQuery)) return false;
                const nodeDiv = document.createElement('div'); nodeDiv.className = node.id === 'root' ? '' : 'node-container';
                const label = document.createElement('div'); label.className = `node-label`;
                
                const arrow = document.createElement('span');
                if (node.children && node.children.length > 0) {
                    arrow.className = 'toggle-arrow'; arrow.innerHTML = node.isOpen ? '▼' : '▶';
                    arrow.onclick = (e) => { e.stopPropagation(); node.isOpen = !node.isOpen; save(); };
                } else { arrow.className = 'toggle-placeholder'; }
                
                let icon = node.type === 'location' ? '📂' : node.type === 'company' ? '🏢' : '👤';
                label.innerHTML = `${arrow.outerHTML} <span class="icon-box">${icon}</span> ${node.name}`;
                label.onclick = () => loadProfile(node);
                nodeDiv.appendChild(label);

                if (node.isOpen && node.children) {
                    const childrenDiv = document.createElement('div');
                    node.children.forEach(child => renderNode(child, childrenDiv));
                    nodeDiv.appendChild(childrenDiv);
                }
                parentEl.appendChild(nodeDiv); return true;
            };
            renderNode(crmData, root);
        }

        function loadProfile(node) {
            activeContact = node;
            document.getElementById('prof-name').innerText = node.name;
            const d = node.details || {};
            document.getElementById('prof-status').innerText = d.status || 'Lead';
            document.getElementById('prof-value').innerText = formatCurrency(d.value);
            document.getElementById('disp-title').innerText = d.title || 'N/A';
            document.getElementById('disp-email').innerText = d.email || 'N/A';
            document.getElementById('disp-phone').innerText = d.phone || 'N/A';
            
            const tl = document.getElementById('prof-timeline'); tl.innerHTML = '';
            if(d.history) { d.history.forEach(h => {
                const item = document.createElement('div'); item.className = 'tl-item';
                item.innerHTML = `<strong>${h.type.toUpperCase()}</strong> (${h.date})<br>${h.content}`;
                tl.appendChild(item);
            }); }
            switchNav('profile');
        }

        document.getElementById('btn-edit-profile').onclick = () => {
            if(!activeContact) return;
            editingId = activeContact.id;
            document.getElementById('modal-title').innerText = 'Edit ' + activeContact.name;
            document.getElementById('modal-parent-group').style.display = 'none';
            document.getElementById('modal-type-group').style.display = 'none';
            
            document.getElementById('modal-name').value = activeContact.name;
            const d = activeContact.details || {};
            document.getElementById('modal-status').value = d.status || 'Lead';
            document.getElementById('modal-value').value = d.value || 0;
            document.getElementById('modal-title-input').value = d.title || '';
            document.getElementById('modal-phone').value = d.phone || '';
            document.getElementById('modal-email').value = d.email || '';
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        document.getElementById('entry-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('modal-name').value;
            const status = document.getElementById('modal-status').value;
            const val = document.getElementById('modal-value').value;
            
            if (editingId) {
                // UNIVERSAL FIND AND UPDATE
                const updateNode = (n) => {
                    if (n.id === editingId) {
                        n.name = name;
                        n.details = { ...n.details, status: status, value: val, title: document.getElementById('modal-title-input').value, phone: document.getElementById('modal-phone').value, email: document.getElementById('modal-email').value };
                        return true;
                    }
                    if (n.children) return n.children.some(updateNode);
                };
                updateNode(crmData);
            } else {
                // ADD NEW
                const parentId = editingId ? null : (document.getElementById('modal-parent-group').style.display === 'none' ? activeContact.id : document.getElementById('modal-parent').value);
                const newNode = { id: 'id_'+Date.now(), name: name, type: document.getElementById('modal-type').value, details: { status: status, value: val, history: [] }, children: [] };
                const addNode = (n) => {
                    if (n.id === parentId) { n.children.push(newNode); n.isOpen = true; return true; }
                    if (n.children) return n.children.some(addNode);
                };
                addNode(crmData);
            }
            await save(); closeModal();
        };

        window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

        document.getElementById('btn-add-sub').onclick = () => {
            editingId = null;
            document.getElementById('modal-title').innerText = 'Add Under ' + activeContact.name;
            document.getElementById('modal-parent-group').style.display = 'none';
            document.getElementById('modal-type-group').style.display = 'block';
            document.getElementById('entry-form').reset();
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        document.getElementById('btn-delete-profile').onclick = async () => {
            if (confirm('Delete this entry?')) {
                const delNode = (parent) => {
                    const i = parent.children.findIndex(c => c.id === activeContact.id);
                    if (i !== -1) { parent.children.splice(i, 1); return true; }
                    return parent.children.some(delNode);
                };
                delNode(crmData); activeContact = null; await save(); switchNav('dashboard');
            }
        };

        function updateDashboard() {
            let count = 0, pipe = 0;
            const walk = (n) => { count++; pipe += Number(n.details?.value || 0); if(n.children) n.children.forEach(walk); };
            walk(crmData);
            document.getElementById('dash-total').innerText = count;
            document.getElementById('dash-pipe-val').innerText = formatCurrency(pipe);
        }

        loadData();
    </script>
</body>
</html>
